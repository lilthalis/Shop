<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cosmic Playground — Maison Italiana</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* =========================
   ROOT VARIABLES
========================= */
:root{
  --ivory:#FDFCF9;
  --gold:#C5B358;
  --anthracite:#1a1a1a;

  --transition-smooth:cubic-bezier(.77,0,.18,1);
}

/* =========================
   RESET
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--ivory);
  color:var(--anthracite);
  overflow-x:hidden;
}

/* =========================
   TOP BAR
========================= */
.topbar{
  background:var(--anthracite);
  color:white;
  text-align:center;
  font-size:.75rem;
  letter-spacing:2px;
  padding:6px 0;
}

/* =========================
   HEADER
========================= */
header{
  position:fixed;
  top:26px;
  width:100%;
  z-index:1000;

  backdrop-filter:blur(14px);
  background:rgba(253,252,249,0.6);
  border-bottom:1px solid rgba(0,0,0,0.05);
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 60px;
}

.logo{
  font-family:'Bodoni Moda',serif;
  letter-spacing:8px;
  font-size:1.1rem;
}

.menu-btn{
  cursor:pointer;
  font-size:.9rem;
  letter-spacing:3px;
}

/* =========================
   FULLSCREEN MENU
========================= */
.menu-overlay{
  position:fixed;
  inset:0;
  background:var(--ivory);
  display:flex;
  justify-content:center;
  align-items:center;

  transform:translateY(-100%);
  transition:transform .6s var(--transition-smooth);
  z-index:2000;
}

.menu-overlay.active{
  transform:translateY(0);
}

.menu-overlay ul{
  list-style:none;
  text-align:center;
}

.menu-overlay li{
  font-family:'Bodoni Moda',serif;
  font-size:3rem;
  letter-spacing:8px;
  margin:25px 0;
  cursor:pointer;
  transition:.3s;
}

.menu-overlay li:hover{
  color:var(--gold);
}

/* =========================
   HERO SECTION
========================= */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:120px 20px;
}

.hero-frame{
  border:1px solid var(--gold);
  padding:20px;
  max-width:1200px;
  width:100%;
}

.hero-image{
  position:relative;
  height:70vh;
  background:url("https://images.unsplash.com/photo-1520975922284-9a9b2b9d3f6f?q=80&w=2000") center/cover no-repeat;
}

.hero-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;

  background:rgba(253,252,249,0.75);
  backdrop-filter:blur(10px);

  padding:50px 70px;
}

.hero h1{
  font-family:'Bodoni Moda',serif;
  font-size:3rem;
  letter-spacing:10px;
  margin-bottom:15px;
}

.hero p{
  letter-spacing:2px;
  font-size:.9rem;
  margin-bottom:25px;
}

.btn{
  border:1px solid var(--gold);
  padding:12px 28px;
  letter-spacing:3px;
  font-size:.75rem;
  cursor:pointer;
  background:none;
  transition:.4s;
}

.btn:hover{
  background:var(--gold);
  color:white;
}

/* =========================
   SECTIONS
========================= */
section{
  padding:120px 60px;
}

.section-title{
  font-family:'Bodoni Moda',serif;
  letter-spacing:8px;
  font-size:2rem;
  margin-bottom:60px;
  text-align:center;
}

/* COLLECTION GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:40px;
}

.card{
  opacity:0;
  transform:translateY(40px);
  transition:1s var(--transition-smooth);
}

.card.visible{
  opacity:1;
  transform:translateY(0);
}

.card img{
  width:100%;
  height:420px;
  object-fit:cover;
  margin-bottom:20px;
}

.card h3{
  font-family:'Bodoni Moda',serif;
  letter-spacing:5px;
  font-size:1rem;
}

/* =========================
   FOOTER
========================= */
footer{
  text-align:center;
  padding:60px;
  font-size:.8rem;
  letter-spacing:3px;
  border-top:1px solid rgba(0,0,0,0.08);
}

</style>
</head>

<body>

<div class="topbar">
SPEDIZIONE GRATUITA IN TUTTO IL MONDO
</div>

<header>
  <nav class="nav">
    <div class="menu-btn" id="openMenu">MENU</div>
    <div class="logo">COSMIC PLAYGROUND</div>
    <div>PROFILO</div>
  </nav>
</header>

<!-- MENU OVERLAY -->
<div class="menu-overlay" id="menu">
  <ul>
    <li>Collezioni</li>
    <li>Su Misura</li>
    <li>Sartoria</li>
    <li>L'Atelier</li>
    <li>Contatti</li>
  </ul>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-frame">
    <div class="hero-image">
      <div class="hero-box">
        <h1>LA DUFFEL COSMICA</h1>
        <p>L'essenza del viaggio italiano.</p>
        <button class="btn">SCOPRI DI PIÙ</button>
      </div>
    </div>
  </div>
</section>

<!-- COLLECTION -->
<section>
  <h2 class="section-title">NUOVA COLLEZIONE</h2>

  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1523381294911-8d3cead13475?q=80&w=1200">
      <h3>PELLETTERIA</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?q=80&w=1200">
      <h3>SARTORIA</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1520975698519-59c6b8b7d3f7?q=80&w=1200">
      <h3>ACCESSORI</h3>
    </div>
  </div>
</section>

<footer>
MILANO · EST. 2026 — COSMIC PLAYGROUND
</footer>

<script>

/* =========================
   MENU TOGGLE
========================= */

const menu = document.getElementById("menu");
const openBtn = document.getElementById("openMenu");

openBtn.addEventListener("click",()=>{
  menu.classList.toggle("active");
});

menu.addEventListener("click",()=>{
  menu.classList.remove("active");
});

/* =========================
   SCROLL ANIMATION
========================= */

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("visible");
    }
  });
},{
  threshold:0.2
});

document.querySelectorAll(".card")
.forEach(el=>observer.observe(el));

</script>

</body>
</html>
